apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana

spec:
  replicas: 1

  selector:
    matchLabels:
      app: grafana

  template:
    metadata:
      labels:
        app: grafana

    spec:
      containers:
        - name: grafana
          image: grafana/grafana:10.4.0

          ports:
            - containerPort: 3000

          volumeMounts:
            - name: datasource
              mountPath: /etc/grafana/provisioning/datasources

            - name: provider
              mountPath: /etc/grafana/provisioning/dashboards

            - name: dashboards
              mountPath: /var/lib/grafana/dashboards

      volumes:
        - name: datasource
          configMap:
            name: grafana-datasource

        - name: provider
          configMap:
            name: grafana-dashboard-provider

        - name: dashboards
          configMap:
            name: grafana-dashboards