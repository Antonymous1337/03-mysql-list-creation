apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: my-namespace

data:
  cluster-health.json: |
    {
      "title": "Example Metrics",
      "panels": [
        {
          "type": "graph",
          "title": "Requests",
          "targets": [
            {
              "expr": "rate(http_requests_total[5m])"
            }
          ]
        }
      ]
    }