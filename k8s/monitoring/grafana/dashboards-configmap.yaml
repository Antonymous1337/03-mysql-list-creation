apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: my-namespace

data:
  cluster-health.json: |
    {
      "id": null,
      "uid": "cluster-health",
      "title": "Cluster Health",
      "schemaVersion": 38,
      "version": 1,
      "time": {
        "from": "now-15m",
        "to": "now"
      },
      "panels": [
        {
          "id": 1,
          "type": "timeseries",
          "title": "Pods Ready by Deployment",
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "sum(kube_pod_status_ready{condition=\"true\"}) by (namespace, pod)",
              "refId": "A"
            }
          ]
        },
        {
          "id": 2,
          "type": "timeseries",
          "title": "Available Replicas per Deployment",
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "kube_deployment_status_replicas_available",
              "refId": "A"
            }
          ]
        }
      ]
    }
  backend-health.json: |
    {
      "id": null,
      "uid": "backend-health",
      "title": "Backend Health",
      "schemaVersion": 38,
      "version": 1,
      "time": {
        "from": "now-15m",
        "to": "now"
      },
      "panels": [
        {
          "id": 1,
          "type": "timeseries",
          "title": "HTTP Requests per Second (Instantaneous)",
          "description": "Shows requests per second using last 2 data points - more responsive to recent activity",
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "sum(irate(backend_http_requests_total[1m])) by (route, status)",
              "refId": "A",
              "legendFormat": "{{route}} - {{status}}"
            }
          ],
          "yaxes": [
            {
              "format": "reqps",
              "label": "Requests/Second"
            }
          ]
        },
        {
          "id": 2,
          "type": "timeseries",
          "title": "Total HTTP Requests (Last 5 Minutes)",
          "description": "Total number of requests in the last 5 minutes",
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "sum(increase(backend_http_requests_total[5m])) by (route, status)",
              "refId": "A",
              "legendFormat": "{{route}} - {{status}}"
            }
          ],
          "yaxes": [
            {
              "format": "short",
              "label": "Total Requests"
            }
          ]
        },
        {
          "id": 3,
          "type": "timeseries",
          "title": "Todo Inserts per Second (Instantaneous)",
          "description": "Shows inserts per second using last 2 data points",
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "irate(backend_todo_inserts_total[1m])",
              "refId": "A",
              "legendFormat": "Todo Inserts/sec"
            }
          ],
          "yaxes": [
            {
              "format": "short",
              "label": "Inserts/Second"
            }
          ]
        },
        {
          "id": 4,
          "type": "timeseries",
          "title": "Total Todo Inserts (Last 5 Minutes)",
          "description": "Total number of todos inserted in the last 5 minutes",
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "increase(backend_todo_inserts_total[5m])",
              "refId": "A",
              "legendFormat": "Total Inserts"
            }
          ],
          "yaxes": [
            {
              "format": "short",
              "label": "Total Inserts"
            }
          ]
        },
        {
          "id": 5,
          "type": "stat",
          "title": "Total Todos Inserted (All Time)",
          "description": "Cumulative count of todos inserted since backend started",
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "backend_todo_inserts_total",
              "refId": "A"
            }
          ],
          "options": {
            "graphMode": "none",
            "colorMode": "value",
            "justifyMode": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "decimals": 0
            }
          }
        }
      ]
    }