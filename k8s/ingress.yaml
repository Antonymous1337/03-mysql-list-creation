# minikube addons enable ingress
# NOT WINDOWS:
#   - need to add <minikube ip> <hostname> for each hostname in etc/hosts
# WINDOWS:
#   - Instead of <minikube ip> do the ip of kubernetes cluster (e.g. 127.0.0.1)
#   - kubectl port-forward -n ingress-nginx svc/ingress-nginx-controller 80:80
#   - then go to local browser for phpmyadmin.local or app.local or any host you define here

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ingress
  namespace: my-namespace
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  rules:
  # Have to add this to /etc/hosts to direct traffic in browser to this ingress
  - host: phpmyadmin.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: phpmyadmin-service
            port:
              number: 80
  - host: grafana.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: grafana-service
            port:
              number: 3000
  - host: prometheus.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: prometheus-service
            port:
              number: 9090
  - host: app.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend-service
            port:
              number: 80
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: backend-service
            port:
              number: 3000 