apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: my-namespace

data:
  cluster-health.json: |
    {
      "id": null,
      "uid": "cluster-health",
      "title": "Cluster Health",
      "schemaVersion": 38,
      "version": 1,
      "time": {
        "from": "now-15m",
        "to": "now"
      },
      "panels": [
        {
          "id": 1,
          "type": "timeseries",
          "title": "Pods Ready by Deployment",
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "sum(kube_pod_status_ready{condition=\"true\"}) by (namespace, pod)",
              "refId": "A"
            }
          ]
        },
        {
          "id": 2,
          "type": "timeseries",
          "title": "Available Replicas per Deployment",
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "kube_deployment_status_replicas_available",
              "refId": "A"
            }
          ]
        }
      ]
    }
  backend-health.json: |
    {
      "id": null,
      "uid": "backend-health",
      "title": "Backend Health",
      "schemaVersion": 38,
      "version": 1,
      "time": {
        "from": "now-15m",
        "to": "now"
      },
      "panels": [
        {
          "id": 1,
          "type": "timeseries",
          "title": "Backend HTTP Requests",
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "sum(rate(backend_http_requests_total[5m])) by (route, status)",
              "refId": "A"
            }
          ]
        },
        {
          "id": 2,
          "type": "timeseries",
          "title": "Todo Inserts per Second",
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "rate(backend_todo_inserts_total[5m])",
              "refId": "A"
            }
          ]
        }
      ]
    }