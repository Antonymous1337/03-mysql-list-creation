apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: my-application-name
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Antonymous1337/03-mysql-list-creation
    targetRevision: HEAD
    path: ./k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: my-namespace
  syncPolicy:
    syncOptions:
    - CreateNamespace=true
    automated:
      selfHeal: true
      prune: true