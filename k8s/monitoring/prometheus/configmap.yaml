apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: my-namespace
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
    scrape_configs:

    - job_name: kube-state-metrics
      static_configs:
      - targets:
        - kube-state-metrics:8080

    - job_name: backend
      metrics_path: /metrics
      static_configs:
      - targets:
        - backend-service:3000
