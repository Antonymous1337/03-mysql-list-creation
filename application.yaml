apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: myapp-argo-application
  namespace: argocd
spec:
  project: default
  source:
    path: ./deployment.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: my-app-ns
  syncPolicy:
    syncOptions:
    - CreateNamespace=true